name: esphome

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate ESPHome config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: pip install "esphome==2026.5.3"

      # `secrets.yaml` is gitignored; provide placeholder values so `!secret`
      # references resolve. No real credentials are needed to validate the config.
      - name: Provide placeholder secrets
        run: cp esphome/secrets.yaml.example esphome/secrets.yaml

      - name: Validate config
        run: esphome config esphome/espectre.yaml
